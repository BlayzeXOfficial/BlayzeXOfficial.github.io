<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BlayzeX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:#111827;
box-shadow:0 0 20px #00e5ff33;
}

nav h2{
color:#00e5ff;
}

nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:#00e5ff;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
color:#00e5ff;
text-shadow:0 0 20px #00e5ff;
}

.hero p{
margin-top:20px;
font-size:22px;
color:#cfcfcf;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:50px;
background:#00e5ff;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #00e5ff;
}

</style>

</head>

<body>

<nav>

<h2>🚀 BlayzeX</h2>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Skills</a></li>
<li><a href="#">Projects</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<section class="hero">

<h1>BlayzeX</h1>

<p>Welcome To My Official Website 🚀</p>

<button>Explore</button>

</section>

</body>
</html>
